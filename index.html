<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uddannelsesstatistik – Karaktergennemsnit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f0f4f9;
      color: #222;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    header {
      max-width: 1100px;
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    header h1 { font-size: 1.5rem; color: #1a3a5c; }
    header p   { font-size: 0.85rem; color: #666; margin-top: 0.2rem; }

    .run-btn {
      background: #2e7cd6;
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 0.6rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .run-btn:hover    { background: #1a5faa; }
    .run-btn:disabled { background: #93b8e6; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #status {
      max-width: 1100px;
      margin: 0 auto 1.5rem;
      font-size: 0.9rem;
      min-height: 1.2em;
    }
    .status-ok   { color: #27a35a; }
    .status-err  { color: #d0341c; }
    .status-info { color: #2e7cd6; }

    /* ── School block ── */
    .school-block {
      max-width: 1100px;
      margin: 0 auto 2.5rem;
    }

    .school-header {
      background: #1a3a5c;
      color: #fff;
      border-radius: 10px 10px 0 0;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .school-header h2 { font-size: 1.25rem; font-weight: 700; }

    .school-body {
      background: #fff;
      border-radius: 0 0 10px 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    /* ── Subject row ── */
    .subject-section { border-bottom: 1px solid #e5eaf1; }
    .subject-section:last-child { border-bottom: none; }

    .subject-title {
      padding: 0.75rem 1.5rem;
      font-weight: 700;
      font-size: 0.95rem;
      color: #1a3a5c;
      background: #f4f7fb;
      border-bottom: 1px solid #e5eaf1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .subject-title::before { content: "📘"; font-size: 0.85rem; }

    /* ── Grade pills ── */
    .years-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      padding: 0.85rem 1.5rem;
    }

    .year-pill {
      background: #f0f4f9;
      border: 1px solid #d0dbe8;
      border-radius: 8px;
      padding: 0.4rem 0.75rem;
      font-size: 0.82rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 78px;
      transition: background 0.15s;
    }
    .year-pill:hover { background: #e2ecf8; }

    .year-label {
      font-size: 0.7rem;
      color: #666;
      margin-bottom: 0.2rem;
      white-space: nowrap;
    }

    .year-grade          { font-size: 1.1rem; font-weight: 700; color: #1a3a5c; }
    .year-grade.high     { color: #1a7c3e; }
    .year-grade.low      { color: #c0392b; }

    /* ── Institution input ── */
    .inst-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .inst-row label {
      font-size: 0.82rem;
      font-weight: 600;
      color: #eaf0f8;
      white-space: nowrap;
    }

    .inst-row input {
      padding: 0.45rem 0.7rem;
      border: 1px solid #4a6fa5;
      border-radius: 6px;
      font-size: 0.9rem;
      width: 130px;
      background: #162f50;
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    .inst-row input:focus {
      border-color: #7eb8f7;
      box-shadow: 0 0 0 3px rgba(126,184,247,0.2);
    }

    /* ── Error / empty ── */
    #placeholder {
      max-width: 1100px;
      margin: 3rem auto;
      text-align: center;
      color: #aab;
      font-size: 1rem;
    }

    pre.error-box {
      max-width: 1100px;
      margin: 1rem auto;
      background: #1e1e2e;
      color: #f38ba8;
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.82rem;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>📊 Uddannelsesstatistik – Karaktergennemsnit</h1>
    <p>9. klassetrin · Elevgennemsnit (uden vægtning)</p>
  </div>
  <div class="inst-row">
    <label for="instInput">Institutionsnummer</label>
    <input type="text" id="instInput" value="157018" placeholder="f.eks. 157018" maxlength="10" />
  </div>
  <button class="run-btn" id="runBtn" onclick="runQuery()">
    <span id="spinnerEl" class="spinner"></span>
    Hent data
  </button>
</header>

<div id="status"></div>
<div id="results"></div>
<div id="placeholder">Klik <strong>Hent data</strong> for at hente statistik.</div>

<script>
  const TOKEN = "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJkb21haW51c2VyIjoiYW5vbnltb3VzIiwidXNlcmlkIjoiRy00Y2UyYTE4ZS1hZDdiLTRjMTYtYTU1ZC0yMGI5MTNjY2NkZWYiLCJ0b2tlbmlkIjoiMjU2M2VjY2QtNjAyMy00YTg3LWE5NDMtMDlmNjlkMmVmNDc5IiwiZXhwIjoxODY4MjY1MTU3LCJpc3MiOiJodHRwczovL2RvdG5ldGRldGFpbC5uZXQiLCJhdWQiOiJodHRwczovL2RvdG5ldGRldGFpbC5uZXQifQ.DjWQJWlso1CtqYziVxyrU_5v-Di2EVEaK7wU3N-E7O8";

  function setStatus(msg, type = 'info') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = `status-${type}`;
  }

  async function runQuery() {
    const instNr = document.getElementById('instInput').value.trim();
    if (!instNr) { setStatus('⚠️  Angiv venligst et institutionsnummer.', 'err'); return; }

    const runBtn  = document.getElementById('runBtn');
    const spinner = document.getElementById('spinnerEl');
    runBtn.disabled = true;
    spinner.style.display = 'block';
    setStatus('Henter data…', 'info');
    document.getElementById('results').innerHTML = '';
    document.getElementById('placeholder').style.display = 'none';

    const headers = new Headers();
    headers.append("Content-Type", "application/json");
    headers.append("Accept", "text/plain");
    headers.append("Authorization", TOKEN);

    const body = JSON.stringify({
      "område": "GS",
      "emne": "KARA",
      "underemne": "KARAFF",
      "nøgletal": ["Elevgennemsnit (uden vægtning)"],
      "detaljering": [
        "[Institution].[Institution]",
        "[Fag].[Fag]",
        "[Skoleår].[Skoleår]"
      ],
      "filtre": {
        "[Klassetrin].[Klassetrin]": ["9"],
        "[Institution].[Institutionsnummer]": [instNr]
      },
      "indlejret": true,
      "tomme_rækker": false,
      "formattering": "json",
      "side": 1
    });

    try {
      const response = await fetch("https://api.uddannelsesstatistik.dk/Api/v1/statistik", {
        method: "POST",
        headers,
        body,
        redirect: "follow"
      });

      const text = await response.text();

      if (!response.ok) {
        setStatus(`❌  HTTP ${response.status} – ${response.statusText}`, 'err');
        const pre = document.createElement('pre');
        pre.className = 'error-box';
        pre.textContent = text;
        document.getElementById('results').appendChild(pre);
        return;
      }

      const data = JSON.parse(text);
      setStatus(`✅  Data hentet`, 'ok');
      renderSchools(data);
    } catch (err) {
      setStatus(`❌  Fejl: ${err.message}`, 'err');
      console.error(err);
    } finally {
      runBtn.disabled = false;
      spinner.style.display = 'none';
    }
  }

  /* ── Rendering ─────────────────────────────────────── */

  function gradeColor(gradeStr) {
    const n = parseFloat(String(gradeStr).replace(',', '.'));
    if (isNaN(n)) return '';
    if (n >= 9) return 'high';
    if (n < 6)  return 'low';
    return '';
  }

  function renderSchools(data) {
    const container = document.getElementById('results');
    container.innerHTML = '';

    // Response shape: { "School": { "Subject": { "Year": { "metric": "value" } } } }
    for (const [schoolName, subjects] of Object.entries(data)) {
      const block = document.createElement('div');
      block.className = 'school-block';

      // School header
      const hdr = document.createElement('div');
      hdr.className = 'school-header';
      hdr.innerHTML = `<span style="font-size:1.4rem">🏫</span><h2>${escHtml(schoolName)}</h2>`;
      block.appendChild(hdr);

      const body = document.createElement('div');
      body.className = 'school-body';

      // Subjects sorted alphabetically
      const sortedSubjects = Object.entries(subjects).sort(([a], [b]) => a.localeCompare(b, 'da'));

      for (const [subject, years] of sortedSubjects) {
        const section = document.createElement('div');
        section.className = 'subject-section';

        const title = document.createElement('div');
        title.className = 'subject-title';
        title.textContent = subject;
        section.appendChild(title);

        const row = document.createElement('div');
        row.className = 'years-row';

        // Years sorted chronologically
        const sortedYears = Object.entries(years).sort(([a], [b]) =>
          parseInt(a) - parseInt(b)
        );

        for (const [year, metrics] of sortedYears) {
          const gradeValue = Object.values(metrics)[0] ?? '–';

          const pill = document.createElement('div');
          pill.className = 'year-pill';

          const lbl = document.createElement('span');
          lbl.className = 'year-label';
          lbl.textContent = year;

          const grade = document.createElement('span');
          grade.className = `year-grade ${gradeColor(gradeValue)}`;
          grade.textContent = gradeValue;

          pill.appendChild(lbl);
          pill.appendChild(grade);
          row.appendChild(pill);
        }

        section.appendChild(row);
        body.appendChild(section);
      }

      block.appendChild(body);
      container.appendChild(block);
    }
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>

</body>
</html>
